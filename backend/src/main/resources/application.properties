spring.application.name=backend

spring.config.import=optional:file:.env[.properties]
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION}

spring.security.oauth2.resourceserver.jwt.jwk-set-uri=https://resolved-yeti-91.clerk.accounts.dev/.well-known/jwks.json
spring.security.oauth2.resourceserver.jwt.issuer-uri=https://resolved-yeti-91.clerk.accounts.dev

